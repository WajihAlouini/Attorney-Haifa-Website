name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-progress runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # -------------------------------------------------
  # 1. Quality Gate — lint + test (fast, no build)
  # -------------------------------------------------
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Cache ESLint
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .eslintcache
          key: eslint-${{ runner.os }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}

      - name: Lint
        run: npm run lint -- --cache --cache-location .eslintcache

      - name: Test
        run: npx vitest run

  # -------------------------------------------------
  # 2. Deploy — single build + Vercel deploy
  #    (eliminates the old separate build job)
  # -------------------------------------------------
  deploy:
    needs: quality
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.vercel-deploy.outputs.preview-url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      url: ${{ steps.vercel-deploy.outputs.preview-url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Cache Playwright browsers to avoid re-downloading every run (~150MB)
      - name: Cache Playwright
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Build
        run: npm run build:prerender
        env:
          NODE_ENV: production
          VITE_WEB3FORMS_ACCESS_KEY: ${{ secrets.VITE_WEB3FORMS_ACCESS_KEY }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_ENV: production
          VITE_CALENDLY_URL: ${{ secrets.VITE_CALENDLY_URL }}

      # Construct .vercel/output so we can use `vercel deploy --prebuilt`
      # This avoids vercel build re-running npm ci with only prod deps
      - name: Prepare Vercel output
        run: |
          node --input-type=module << 'NODE'
          import { cpSync, mkdirSync, readFileSync, writeFileSync } from 'node:fs';
          import { getTransformedRoutes } from '@vercel/routing-utils';

          mkdirSync('.vercel/output', { recursive: true });
          cpSync('dist', '.vercel/output/static', { recursive: true });

          const vercelConfig = JSON.parse(readFileSync('vercel.json', 'utf8'));
          const { routes, error } = getTransformedRoutes({
            redirects: vercelConfig.redirects ?? [],
            headers: vercelConfig.headers ?? [],
          });

          if (error) {
            throw new Error(error.message ?? String(error));
          }

          writeFileSync(
            '.vercel/output/config.json',
            JSON.stringify(
              {
                version: 3,
                routes: [
                  ...(routes ?? []),
                  { handle: 'filesystem' },
                  { src: '/(.*)', dest: '/index.html' },
                ],
              },
              null,
              2
            )
          );
          NODE

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token="$VERCEL_TOKEN"

      - name: Deploy
        id: vercel-deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token="$VERCEL_TOKEN")
          echo "preview-url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $DEPLOYMENT_URL"

      - name: Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Deployed to Vercel:** ${{ steps.vercel-deploy.outputs.preview-url }}`
            })

  # -------------------------------------------------
  # 3. Lighthouse — runs against the deployed URL
  #    (no local build/serve needed)
  # -------------------------------------------------
  lighthouse:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Run Lighthouse CI
        run: |
          npx @lhci/cli@0.14.x autorun \
            --collect.url=${{ needs.deploy.outputs.url }} \
            --collect.numberOfRuns=3 \
            --upload.target=temporary-public-storage

      - name: Comment Lighthouse results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Lighthouse CI completed. Check the workflow logs for performance scores.'
            })

  # -------------------------------------------------
  # 4. Security Audit — runs in parallel, actually blocks
  # -------------------------------------------------
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev
